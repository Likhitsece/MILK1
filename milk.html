<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Quality Monitor</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#f8f7f5;padding:24px}
h1{font-size:20px;margin-bottom:10px}
.btn{padding:8px 14px;border:none;border-radius:6px;background:#111;color:#fff;cursor:pointer}
.metric{background:#fff;padding:15px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<h1>Milk Quality Monitor (Simulation)</h1>
<button class="btn" onclick="start()">Start Simulation</button>

<div class="metric">pH: <span id="ph">--</span></div>
<div class="metric">Temperature: <span id="temp">--</span> °C</div>
<div class="metric">Gas: <span id="gas">--</span> ppm</div>
<div class="metric">Status: <span id="status">--</span></div>

<canvas id="chart" height="100"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
let chart;
let data = [];

function random(min,max){return Math.random()*(max-min)+min}

function predict(ph,temp,gas){
  if(gas>300 || temp>10) return "Spoiled";
  if(gas>200 || temp>7) return "Warning";
  return "Fresh";
}

function start(){
  setInterval(()=>{
    const ph = random(6.2,7.0);
    const temp = random(4,12);
    const gas = random(100,400);

    const status = predict(ph,temp,gas);

    document.getElementById("ph").innerText = ph.toFixed(2);
    document.getElementById("temp").innerText = temp.toFixed(1);
    document.getElementById("gas").innerText = Math.round(gas);
    document.getElementById("status").innerText = status;

    data.push(gas);

    if(!chart){
      chart = new Chart(document.getElementById("chart"),{
        type:"line",
        data:{
          labels:data.map((_,i)=>i),
          datasets:[{label:"Gas",data:data}]
        }
      });
    }else{
      chart.data.labels = data.map((_,i)=>i);
      chart.data.datasets[0].data = data;
      chart.update();
    }

  },2000);
}
</script>

</body>
</html>
